<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
		{% if jekyll.environment == 'production' %}
			{% include analytics.html %}
		{% endif %}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>
      {% if page.title %}
				{{ page.title }} - {{ site.title }}
			{% else %}
				{{ site.title }}
			{% endif %}
    </title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  </head>
  <body>
    <div class="border-b mb-6 pb-4 pt-4">
      <header class="mx-auto max-w-[80ch] px-4">
        <nav class="flex items-center justify-between">
          <a href="/" class="font-medium text-xl visited:text-black">{{ site.title }}</a>
          <ul class="text-lg flex">
            <!-- <li class="mr-3"><a href="#">Posts</a></li> -->
            <!-- <li class="mr-3"><a href="#">Projects</a></li> -->
            <!-- <li><a href="#">About Me</a></li> -->
          </ul>
        </nav>
      </header>
    </div>
    {{ content }}
    <div class="border-t pb-4 pt-4">
      <footer class="mx-auto max-w-[80ch] px-4">
        Follow me on Twitter <a class="text-blue-900 underline" href="https://twitter.com/mdoliwa">@mdoliwa</a>
      </footer>
    </div>
  </body>
</html>
