---
layout: default
title: "Home"
---

<div class="max-w-[80ch] mx-auto px-4 mb-4">
  <div>
    <h2 class="text-2xl font-medium mb-3">Posts</h2>
    <ul>
      {% for post in site.posts %}
        <li class="mb-2 grid grid-cols-5 items-baseline">
          <a class="col-span-4 text-lg text-blue-900 underline" href="{{ post.url }}">{{ post.title }}</a>
        </li>
      {% endfor %}
    </ul>
  </div>
</div>
